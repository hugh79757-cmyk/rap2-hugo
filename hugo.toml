baseURL = "https://apply.informationhot.kr/"
googleAnalytics = "G-MESXJGZVLF"
languageCode = "ko"
title = "청약 알리미"
theme = "blowfish"
enableRobotsTXT = true
[pagination]
  pagerSize = 20

[params]
  colorScheme = "sapphire"
  description = "청약홈 API 기반 분양 임대 공고 속보와 당첨 전략"
  mainSections = ["posts"]
  enableSearch = true

  [params.homepage]
    layout = "profile"
    showRecent = true
    recentLimit = 12

  [params.article]
    showDate = true
    showReadingTime = false
    showAuthor = false
    showHero = true
    heroStyle = "background"
    showSummary = true
    sharingLinks = ["facebook", "x-twitter", "threads"]

  [params.list]
    showHero = true
    heroStyle = "background"
    showSummary = true
    groupByYear = false

  [params.taxonomy]
    showTermCount = true

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.7
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[[menus.main]]
  name = "글 목록"
  pageRef = "posts"
  weight = 10

[[menus.main]]
  name = "카테고리"
  pageRef = "categories"
  weight = 20

[[menus.main]]
  name = "태그"
  pageRef = "tags"
  weight = 30
